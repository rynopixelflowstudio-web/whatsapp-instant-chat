<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - WAInstant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-content {
            max-width: 600px;
            margin: 4rem auto;
            text-align: center;
            padding: 3rem 2rem;
        }
        .contact-icon {
            font-size: 3.5rem;
            color: var(--primary);
            text-shadow: var(--shadow-glow);
            margin-bottom: 1.5rem;
        }
        .contact-content h1 { font-size: 2.5rem; margin-bottom: 1rem; }
        .contact-content p { color: var(--text-muted); margin-bottom: 2rem; line-height: 1.6; }
        
        .contact-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            transition: var(--transition);
        }
        
        .contact-card:hover {
            border-color: rgba(37, 211, 102, 0.3);
            transform: translateY(-2px);
        }
        
        .contact-card a {
            color: #fff;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition);
        }
        
        .contact-card a:hover {
            color: var(--primary);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }
        .back-link:hover { text-shadow: 0 0 8px var(--primary-glow); transform: translateX(-4px); }
    </style>
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="app-container">
        <main class="glass-card contact-content">
            <div class="contact-icon">
                <i class="fa-solid fa-envelope-circle-check"></i>
            </div>
            <h1>Get in Touch</h1>
            <p>Have a question, feature request, or feedback about WAInstant? Reach out to our team directly via email. We'd love to hear from you!</p>
            
            <div class="contact-card">
                <span style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">Email Support</span>
                <a href="mailto:support@wa-instant.com">support@wa-instant.com</a>
            </div>

            <a href="index.html" class="back-link">← Back to Generator</a>
        </main>
    </div>
</body>
</html>
